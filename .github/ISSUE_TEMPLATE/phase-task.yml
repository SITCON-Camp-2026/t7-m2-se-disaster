name: Phase 0 task
description: Track one Phase 0 classroom task.
title: "[Phase 0] "
labels: ["phase-0"]
body:
  - type: input
    id: phase
    attributes:
      label: Current phase
      placeholder: Phase 0
  - type: textarea
    id: sources
    attributes:
      label: Source materials
      description: Files, issues, or slides students should read first.
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: What students should do now.
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What must be produced before this phase ends.
  - type: textarea
    id: stop
    attributes:
      label: Stop condition
      description: When should students stop adding features and switch to observation or demo checks?
